name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.4'

# ══════════════════════════════════════════════════════════════
# JOB 1: Qualité du code
# ══════════════════════════════════════════════════════════════
jobs:
  quality:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Prettier check
        run: pnpm format:check

      - name: TypeScript check
        run: pnpm typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

# ══════════════════════════════════════════════════════════════
# JOB 2: Build
# ══════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        template: [corporate, sante, immobilier, lifestyle]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.template }}
        run: pnpm turbo build --filter=@template/${{ matrix.template }}
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Variables pour le build (valeurs non-sensibles)
          NEXT_PUBLIC_CORPORATE_SITE_URL: https://corporate.template-demo.cm
          NEXT_PUBLIC_SANTE_SITE_URL: https://sante.template-demo.cm
          NEXT_PUBLIC_IMMO_SITE_URL: https://immo.template-demo.cm
          NEXT_PUBLIC_LIFESTYLE_SITE_URL: https://lifestyle.template-demo.cm
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.template }}
          path: apps/${{ matrix.template }}/.next
          retention-days: 1

# ══════════════════════════════════════════════════════════════
# JOB 3: Docker Build (sur push main seulement)
# ══════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        template: [corporate, sante, immobilier, lifestyle]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.template }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.template }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/template-${{ matrix.template }}:latest
            ${{ secrets.DOCKER_USERNAME }}/template-${{ matrix.template }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ══════════════════════════════════════════════════════════════
# JOB 4: Deploy sur Vercel (PR preview ou push main)
# ══════════════════════════════════════════════════════════════
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        template: [corporate, sante, immobilier, lifestyle]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy ${{ matrix.template }} to Vercel
        run: |
          cd apps/${{ matrix.template }}
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', matrix.template)] }}
