# ══════════════════════════════════════════════════════════════
# Config Nginx pour les 4 templates
#
# En local: accès par port (localhost:3001, etc.)
# En production: accès par sous-domaine
#
# Pour activer les sous-domaines, décommenter les blocs server
# avec server_name et configurer vos DNS:
#   corporate.votredomaine.cm  → IP du serveur
#   sante.votredomaine.cm      → IP du serveur
#   etc.
# ══════════════════════════════════════════════════════════════

# ── Upstream backends ──────────────────────────────────────
# Next.js ne supporte pas les connexions persistantes comme ça,
# mais keepalive améliore les perfs entre Nginx et Next.js

upstream corporate_backend {
    server corporate:3001;
    keepalive 32;
}

upstream sante_backend {
    server sante:3002;
    keepalive 32;
}

upstream immobilier_backend {
    server immobilier:3003;
    keepalive 32;
}

upstream lifestyle_backend {
    server lifestyle:3004;
    keepalive 32;
}

# ── Headers de sécurité communs ───────────────────────────
# Définis en map pour réutilisation

# ── Template Corporate — Port 3001 ────────────────────────
server {
    listen 80;
    # En production, remplacer _ par votre sous-domaine:
    # server_name corporate.votredomaine.cm;
    server_name _;

    # Timeout adapté aux connexions lentes
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    # Headers pour Next.js (IP réelle pour rate limiting)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate limiting sur l'endpoint contact
    location /api/contact {
        limit_req zone=contact burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://corporate_backend;
    }

    # Assets Next.js avec cache agressif
    location /_next/static {
        proxy_pass http://corporate_backend;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid 200 1y;
    }

    # Images optimisées
    location /_next/image {
        proxy_pass http://corporate_backend;
        add_header Cache-Control "public, max-age=86400";
    }

    # Tout le reste
    location / {
        proxy_pass http://corporate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers de sécurité
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip pour les réponses proxy
    gzip_proxied expired no-cache no-store private auth;
}
